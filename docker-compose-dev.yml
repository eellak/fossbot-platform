version: '3.8'
services:
  frontend:
    build:
      context: .
      dockerfile: front-end/Dockerfile.dev
    container_name: fsbt-front-local
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/usr/src/app/front-end
      - /usr/src/app/front-end/node_modules
    env_file:
      - front-end/.env
    stdin_open: true
    tty: true
    depends_on:
      - backend

  backend:
    image: fsbt-back
    container_name: fsbt-back
    build: ./back-end
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./back-end/test.db:/usr/src/app/back-end/test.db
      - ./back-end/main.py:/usr/src/app/back-end/main.py
      - ./back-end/utils:/usr/src/app/back-end/utils
      - ./back-end/database:/usr/src/app/back-end/database
      - ./back-end/models:/usr/src/app/back-end/models

  db:
    image: postgres:latest
    container_name: fsbt-db
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data: