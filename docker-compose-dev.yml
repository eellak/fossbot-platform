services:
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile.dev
    container_name: fsbt-front-local
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/usr/src/app/front-end
      - ./sim:/usr/src/app/sim
      - /usr/src/app/front-end/node_modules
    env_file:
      - front-end/.env
    stdin_open: true
    tty: true
    depends_on:
      - backend

  backend:
    image: fsbt-back
    container_name: fsbt-back-local
    build: ./back-end
    env_file:
      - .env
      - back-end/.env
    environment:
      - BACKEND_RELOAD=${BACKEND_RELOAD:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./back-end/test.db:/usr/src/app/back-end/test.db
      - ./back-end/main.py:/usr/src/app/back-end/main.py
      - ./back-end/utils:/usr/src/app/back-end/utils
      - ./back-end/database:/usr/src/app/back-end/database
      - ./back-end/models:/usr/src/app/back-end/models
    depends_on:
      - db

  db:
    image: postgres:16.3
    container_name: fsbt-db-local
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - db-data-local:/var/lib/postgresql

volumes:
  db-data-local:
