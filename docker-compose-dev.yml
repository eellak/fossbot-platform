services:
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/usr/src/app/front-end
      - ./sim:/usr/src/app/sim
      - ./sim:/usr/src/app/sim
      - /usr/src/app/front-end/node_modules
    env_file:
      - front-end/.env
    stdin_open: true
    tty: true
    depends_on:
      - backend

  backend:
    image: fsbt-back
    build: ./back-end
    env_file:
      - .env
      - back-end/.env
    environment:
      - BACKEND_RELOAD=${BACKEND_RELOAD:-true}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG:-}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-}
      - GITHUB_TOKEN_ENCRYPTION_KEY=${GITHUB_TOKEN_ENCRYPTION_KEY:-}
      - GITHUB_APP_CALLBACK_URL=${GITHUB_APP_CALLBACK_URL:-http://localhost:8000/auth/github/callback}
      - GITHUB_APP_SETUP_URL=${GITHUB_APP_SETUP_URL:-http://localhost:8000/auth/github/setup}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./back-end/test.db:/usr/src/app/back-end/test.db
      - ./back-end/main.py:/usr/src/app/back-end/main.py
      - ./back-end/routers:/usr/src/app/back-end/routers
      - ./back-end/utils:/usr/src/app/back-end/utils
      - ./back-end/database:/usr/src/app/back-end/database
      - ./back-end/models:/usr/src/app/back-end/models
      - ./secrets:/usr/src/app/secrets:ro
    depends_on:
      - db

  db:
    image: postgres:16.3
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - db-data-local:/var/lib/postgresql

volumes:
  db-data-local:
